<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Redirecting…</title>
  <script>
    (function () {
      var p = location.pathname;
      var q = location.search + location.hash;
      var dest = p.replace(/portfolio\.html$/i, "portfolio/");
      location.replace(dest + q);
    })();
  </script>
  <meta http-equiv="refresh" content="0;url=portfolio/" />
</head>

<body>
  <p><a href="portfolio/">Continue to Portfolio</a></p>
</body>

</html>
