<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Redirecting…</title>
  <script>
    (function () {
      var p = location.pathname;
      var q = location.search + location.hash;
      if (/portfolio\.html$/i.test(p)) {
        location.replace(p.replace(/portfolio\.html$/i, "portfolio/") + q);
        return;
      }
      // /portfolio (no slash) often maps to this file — send users to the real folder URL once.
      if (/\/portfolio$/i.test(p)) {
        location.replace(p + "/" + q);
      }
    })();
  </script>
</head>

<body>
  <p><a href="/portfolio/">Continue to Portfolio</a></p>
</body>

</html>
